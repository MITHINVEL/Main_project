name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monitoring_system_for_street_lights

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: monitoring_system_for_street_lights/functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install functions dependencies
        run: npm ci
        working-directory: monitoring_system_for_street_lights/functions

      - name: Authenticate with Firebase
        run: |
          echo '${{ secrets.FIREBASE_TOKEN }}' > $HOME/gcloud-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json

      - name: Deploy to Firebase
        run: firebase deploy --only functions,firestore:rules --project street-light-monitor-dec88
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/gcloud-key.json
