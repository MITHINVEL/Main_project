name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install functions dependencies
        run: npm ci
        working-directory: monitoring_system_for_street_lights/functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Create service account key file
        working-directory: monitoring_system_for_street_lights
        run: echo '${{ secrets.FIREBASE_TOKEN }}' > /tmp/sa-key.json

      - name: Deploy Firestore Rules
        working-directory: monitoring_system_for_street_lights
        run: firebase deploy --only firestore:rules --project street-light-monitor-dec88
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json

      - name: Deploy Cloud Functions
        working-directory: monitoring_system_for_street_lights
        run: firebase deploy --only functions --project street-light-monitor-dec88
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json

      - name: Cleanup
        if: always()
        run: rm -f /tmp/sa-key.json
